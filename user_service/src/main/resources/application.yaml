server:
  port: 8081

spring:
  application:
    name: user-service

  # Conexión a tu base de datos PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/BookStackDB
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  # Configuración mágica de Hibernate (creará las tablas por ti)
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Registro en el servidor Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/